server:
  port: 8081

spring:
  application:
    name: user-service
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/ticketflow_user?createDatabaseIfNotExist=true
    username: root
    password: root

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://ticketflow-mysql:3306/ticketflow_user?createDatabaseIfNotExist=true
    username: root
    password: root
