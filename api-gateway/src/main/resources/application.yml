server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**
        - id: access-service
          uri: http://access-service:8082
          predicates:
            - Path=/api/access/**
        - id: event-service
          uri: http://event-service:8083
          predicates:
            - Path=/api/events/**
        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/api/notifications/**
        - id: order-service
          uri: http://order-service:8085
          predicates:
            - Path=/api/orders/**
        - id: payment-service
          uri: http://payment-service:8086
          predicates:
            - Path=/api/payments/**
        - id: report-service
          uri: http://report-service:8087
          predicates:
            - Path=/api/reports/**
        - id: reservation-service
          uri: http://reservation-service:8088
          predicates:
            - Path=/api/reservations/**
        - id: ticket-service
          uri: http://ticket-service:8089
          predicates:
            - Path=/api/tickets/**
        - id: venue-service
          uri: http://venue-service:8090
          predicates:
            - Path=/api/venues/**
        - id: openapi
          uri: http://localhost:${server.port}
          predicates:
            - Path=/v3/api-docs/**
